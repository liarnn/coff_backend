spring:
  application:
    name: coffee_backend_4j
  datasource:
    url: jdbc:mysql://localhost:3306/coffee_shop?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
  rabbitmq:
    host: 192.168.239.128
    port: 5672
    username: guest
    password: guest

server:
  address: 0.0.0.0
  port: 8080

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: coffee_shop_secret_key_2024_jwt_token_secret
  expiration: 86400000
aliyun:
  oss:
    endpoint: https://oss-cn-chengdu.aliyuncs.com  # 请根据您的地域修改
    access-key-id: ${aliyun_access_key_id}  # 请修改为您的accessKeyId
    access-key-secret: ${aliyun_access_key_secret}  # 请修改为您的accessKeySecret
    bucket-name: coff-image  # 请修改为您的bucket名称
    folder: coffee/  # 可选，上传的文件夹前缀